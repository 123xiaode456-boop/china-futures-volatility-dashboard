<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>国内商品期货波动率</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">China Commodity Futures</p>
          <h1>国内商品期货波动率</h1>
        </div>
        <dl class="meta-grid">
          <div>
            <dt>数据日期</dt>
            <dd data-data-date>-</dd>
          </div>
          <div>
            <dt>更新时间</dt>
            <dd data-updated>-</dd>
          </div>
          <div>
            <dt>数据源</dt>
            <dd data-source>-</dd>
          </div>
        </dl>
      </header>

      <section class="summary-grid" data-summary aria-label="市场汇总"></section>

      <section class="toolbar" aria-label="筛选和排序">
        <label class="field search-field">
          <span>搜索</span>
          <input data-search type="search" placeholder="品种 / 合约 / 交易所" />
        </label>
        <label class="field">
          <span>交易所</span>
          <select data-exchange-filter>
            <option value="ALL">全部交易所</option>
          </select>
        </label>
        <label class="field">
          <span>排序</span>
          <select data-sort-field>
            <option value="vol_20">20日波动率</option>
            <option value="vol_60">60日波动率</option>
            <option value="vol_percentile">波动率分位</option>
            <option value="amplitude_pct">当日振幅</option>
            <option value="change_pct">涨跌幅</option>
            <option value="name">品种名称</option>
          </select>
        </label>
        <label class="field compact">
          <span>方向</span>
          <select data-sort-direction>
            <option value="desc">降序</option>
            <option value="asc">升序</option>
          </select>
        </label>
        <div class="row-count" data-row-count>0 条</div>
      </section>

      <p class="message" data-message data-level="info">正在加载数据...</p>

      <section class="table-wrap" aria-label="波动率表格">
        <table>
          <thead>
            <tr>
              <th>交易所</th>
              <th>品种</th>
              <th>合约</th>
              <th>日期</th>
              <th>收盘价</th>
              <th>涨跌幅</th>
              <th>振幅</th>
              <th>20日波动率</th>
              <th>60日波动率</th>
              <th>分位</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody data-table-body></tbody>
        </table>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
