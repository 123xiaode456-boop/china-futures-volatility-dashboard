<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>国内商品期货历史波动率</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">China Commodity Futures</p>
          <h1>国内商品期货历史波动率</h1>
        </div>
        <dl class="meta-grid">
          <div>
            <dt>数据日期</dt>
            <dd data-data-date>-</dd>
          </div>
          <div>
            <dt>更新时间</dt>
            <dd data-updated>-</dd>
          </div>
          <div>
            <dt>数据源</dt>
            <dd data-source>-</dd>
          </div>
        </dl>
      </header>

      <section class="control-band" aria-label="商品选择和日期区间">
        <label class="field wide">
          <span>商品搜索</span>
          <input data-contract-search type="search" placeholder="输入商品名、合约代码或交易所" />
        </label>
        <label class="field wide">
          <span>选择商品</span>
          <select data-contract-select></select>
        </label>
        <label class="field">
          <span>开始日期</span>
          <input data-start-date type="date" />
        </label>
        <label class="field">
          <span>结束日期</span>
          <input data-end-date type="date" />
        </label>
        <div class="quick-actions" data-quick-ranges>
          <button type="button" data-range="3m">近3个月</button>
          <button type="button" data-range="6m">近6个月</button>
          <button type="button" data-range="1y">近1年</button>
          <button type="button" data-range="all">全部</button>
        </div>
      </section>

      <section class="selector-grid">
        <aside class="contract-panel">
          <div class="panel-head">
            <span>可选商品</span>
            <strong data-contract-total>0 个商品</strong>
          </div>
          <div class="contract-list" data-contract-list></div>
        </aside>

        <section class="chart-panel" aria-label="历史K线和波动率图">
          <div class="stat-grid">
            <article>
              <span>当前商品</span>
              <strong data-selected-name>-</strong>
            </article>
            <article>
              <span>区间</span>
              <strong data-selected-range>-</strong>
            </article>
            <article>
              <span>K线数量</span>
              <strong data-selected-count>-</strong>
            </article>
            <article>
              <span>最新收盘</span>
              <strong data-latest-close>-</strong>
            </article>
            <article>
              <span>20日波动率</span>
              <strong data-latest-vol20>-</strong>
            </article>
            <article>
              <span>60日波动率</span>
              <strong data-latest-vol60>-</strong>
            </article>
          </div>

          <p class="message" data-message data-level="info"></p>
          <canvas class="chart-canvas" data-chart></canvas>
        </section>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
